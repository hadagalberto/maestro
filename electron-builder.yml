appId: com.maestro.desktop
productName: Maestro
asar: true
asarUnpack:
  - "**/node_modules/node-pty/**"
directories:
  output: release
  buildResources: build
files:
  - out/**
extraResources:
  - from: build/icon.png
    to: icon.png
win:
  target: nsis
  icon: build/icon.png
mac:
  target: [dmg, zip]
  icon: build/icon.png
linux:
  target: [AppImage, deb]
  icon: build/icon.png
