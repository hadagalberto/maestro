appId: com.maestro.desktop
productName: Maestro
asar: true
# node-pty 1.1 traz prebuild N-API (ABI-estável); rebuild quebra no winpty (sem MSVC).
npmRebuild: false
asarUnpack:
  - "**/node_modules/node-pty/**"
directories:
  output: release
  buildResources: build
files:
  - out/**
extraResources:
  - from: build/icon.png
    to: icon.png
win:
  target: nsis
  icon: build/icon.png
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  include: build/installer.nsh
  artifactName: ${productName}-Setup-${version}.${ext}
  shortcutName: Maestro
mac:
  target: [dmg, zip]
  icon: build/icon.png
linux:
  target: [AppImage, deb]
  icon: build/icon.png
publish:
  provider: github
  owner: hadagalberto
  repo: maestro
