name: test
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm }
      - run: npm ci
      # node-pty 1.1 ships N-API prebuilds (ABI-stable across Node/Electron) for win/mac;
      # on Linux npm ci builds it from source. No electron-rebuild needed.
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npx playwright install --with-deps chromium
      - run: npm run test:component
      - run: npm run build
      - run: ${{ runner.os == 'Linux' && 'xvfb-run -a ' || '' }}npm run test:e2e
        env: { PWTEST_TRACE: on-first-retry }
      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: traces-${{ matrix.os }}, path: test-results/** }
